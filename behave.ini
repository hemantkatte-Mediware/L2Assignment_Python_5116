[behave]

# Feature files location
paths = features

# Step definitions location
steps_dir = steps
# Stop on first failure (set to false for full suite runs)
stop = false

# Show all steps including passing ones
show_skipped = true
show_source  = true
show_timings = true

# Log level for behave's own output
logging_level = INFO
logging_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
logging_datefmt = %H:%M:%S

# Default format for console output
format   = pretty
outfiles = reports/behave_results.txt
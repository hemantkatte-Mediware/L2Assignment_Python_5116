# =============================================================================
# .github/workflows/automation.yml
# =============================================================================
# GitHub Actions CI/CD pipeline for OrangeHRM Automation Suite
# =============================================================================

name: L2 Automation track

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 2 * * *"   # 2:00 AM UTC every day
  workflow_dispatch:
    inputs:
      tags:
        description: "Behave tags to run (e.g. @smoke, @regression)"
        required: false
        default: "@smoke"
      browser:
        description: "Browser to use"
        required: false
        default: "chrome"
        type: choice
        options: [ chrome, firefox, edge ]
      environment:
        description: "Target Application Testing Environment"
        required: false
        default: "demo"
        type: choice
        options: [ dev, qa, staging ]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Run Automated Tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Run Behave Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      # 4. Install Chrome
      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # 5. Verify Chrome installation
      - name: Verify Chrome
        run: google-chrome --version

      # 6. Create output directories
      - name: Create Output Directories
        run: mkdir -p reports screenshots allure-results

      # 7. Determine tags to run
      - name: Set Test Tags
        id: set-tags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAGS=${{ github.event.inputs.tags }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "TAGS=" >> $GITHUB_ENV # <-- Leave blank to run ALL test cases on push
          else
            echo "TAGS=" >> $GITHUB_ENV # <-- Leave blank to run ALL test cases on scheduled runs
          fi

      # 8. Run Behave tests
      - name: Run Behave Tests
        continue-on-error: true
        env:
          BASE_URL:      ${{ vars.BASE_URL || 'https://opensource-demo.orangehrmlive.com' }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'Admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'admin123' }}
          BROWSER:       ${{ github.event.inputs.browser || 'chrome' }}
          HEADLESS:      "true"
        # run: |
        #   behave --tags="${{ env.TAGS }}" --format allure_behave.formatter:AllureFormatter --outfile allure-results --format behave_html_formatter:HTMLFormatter --outfile reports/report.html --format progress2 --no-capture
        run: |
          # Dynamic fallback check: If TAGS is empty or completely missing, force override to ~@none
          if [ -z "${TAGS}" ] || [ "${TAGS}" = '""' ] || [ "${TAGS}" = " " ]; then
            export FINAL_TAGS="~@none"
          else
            export FINAL_TAGS="${TAGS}"
          fi
          
          behave --tags="$FINAL_TAGS" --format allure_behave.formatter:AllureFormatter --outfile allure-results --format behave_html_formatter:HTMLFormatter --outfile reports/report.html --format progress2 --no-capture

      # 9. Upload HTML report
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ github.run_number }}
          path: reports/report.html
          retention-days: 30

      # 10. Upload screenshots
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      # 11. Upload Allure raw results
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Native GitHub Pages Deployment
  # ──────────────────────────────────────────────────────────────────────────
  deploy-reports:
    runs-on: ubuntu-latest
    needs: test                     # Waits for Job 1 to upload results
    if: always()                    # Runs even if test scenarios fail
    
    permissions:
      contents: read
      pages: write
      id-token: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Download the Allure raw results built in the test job
      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results

      # 2. Re-compile the raw data into HTML format
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          keep_reports: 10

      # 3. Pack the output directory as a native page asset
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      # 4. Deploy the packed asset directly to the live GitHub web servers
      - name: Deploy to GitHub Pages Website
        id: deployment
        uses: actions/deploy-pages@v4
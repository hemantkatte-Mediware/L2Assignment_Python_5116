# =============================================================================
# .github/workflows/automation.yml
# =============================================================================
# GitHub Actions CI/CD pipeline for OrangeHRM Automation Suite
#
# Triggers:
#   push          → runs @smoke tests (fast feedback)
#   pull_request  → runs @smoke + @regression
#   schedule      → full nightly run at 2 AM UTC
#   manual        → workflow_dispatch with tag input
# =============================================================================

name: OrangeHRM Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 2 * * *"   # 2:00 AM UTC every day
  workflow_dispatch:
    inputs:
      tags:
        description: "Behave tags to run (e.g. @smoke, @regression)"
        required: false
        default: "@smoke"
      browser:
        description: "Browser to use"
        required: false
        default: "chrome"
        type: choice
        options: [ chrome, firefox, edge ]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Run Automated Tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Run Behave Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      # 4. Install Chrome
      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # 5. Verify Chrome installation
      - name: Verify Chrome
        run: google-chrome --version

      # 6. Create output directories
      - name: Create Output Directories
        run: mkdir -p reports screenshots allure-results

      # 7. Determine tags to run
      - name: Set Test Tags
        id: set-tags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAGS=${{ github.event.inputs.tags }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "TAGS=@smoke" >> $GITHUB_ENV
          else
            echo "TAGS=@smoke,@regression" >> $GITHUB_ENV
          fi

      # 8. Run Behave tests
      - name: Run Behave Tests
        env:
          BASE_URL:      ${{ vars.BASE_URL || 'https://opensource-demo.orangehrmlive.com' }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'Admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'admin123' }}
          BROWSER:       ${{ github.event.inputs.browser || 'chrome' }}
          HEADLESS:      "true"
        run: |
          behave \
            --tags="${{ env.TAGS }}" \
            --format allure_behave.formatter:AllureFormatter \
            --outfile allure-results \
            --format behave_html_formatter:HTMLFormatter \
            --outfile reports/report.html \
            --format progress2 \
            --no-capture \
          || true  # Don't fail the step — let report publishing happen first

      # 9. Upload HTML report
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ github.run_number }}
          path: reports/report.html
          retention-days: 30

      # 10. Upload screenshots (always, most useful on failure)
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      # 11. Upload Allure raw results
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results/
          retention-days: 30

      # 12. Generate and publish Allure HTML report
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 10
          gh_pages: gh-pages

      - name: Publish Allure Report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Notify on failure (Slack or email)
  # ──────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: test
    if: failure()
    steps:
      - name: Send Failure Notification
        run: |
          echo "Tests failed! Workflow: ${{ github.workflow }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          # Add Slack / Teams webhook call here if needed:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"OrangeHRM tests failed on ${{ github.ref_name }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
          #
          #NOT USED DUE TO SECURITY CONCERNS
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: write permissions for github pages deployment
  # ──────────────────────────────────────────────────────────────────────────
  deploy-reports:
    runs-on: ubuntu-latest
    
    # Grant the runner explicit access token rights to write code changes
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4